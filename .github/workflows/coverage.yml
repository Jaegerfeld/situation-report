name: Coverage

on:
  push:
    branches:
      - main
    paths:
      - "**.py"
      - "tests/**"

permissions:
  contents: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get install -y xvfb

      - name: Install dependencies
        run: pip install -e ".[dev]" --quiet

      - name: Run tests with coverage
        run: xvfb-run python -m pytest --cov --cov-report=xml -q --tb=short

      - name: Generate coverage badge
        run: genbadge coverage -i coverage.xml -o docs/coverage.svg

      - name: Commit badge if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/coverage.svg
          git diff --cached --quiet || git commit -m "chore: update coverage badge [skip ci]" && git push
