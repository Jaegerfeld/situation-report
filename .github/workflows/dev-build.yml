name: Dev Build

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build – ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: SituationReport-Windows
            zip_file: SituationReport-Windows.zip
          - os: macos-latest
            artifact: SituationReport-macOS-ARM
            zip_file: SituationReport-macOS-ARM.zip
          - os: ubuntu-latest
            artifact: SituationReport-Linux
            zip_file: SituationReport-Linux.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tkinter (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: pip install -e "." pyinstaller

      - name: Download bundled Chrome (kaleido PDF export)
        run: choreo_get_chrome
        shell: bash

      - name: Build with PyInstaller
        run: pyinstaller build_gui.spec

      - name: Package – Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\SituationReport -DestinationPath SituationReport-Windows.zip

      - name: Package – macOS
        if: runner.os == 'macOS'
        run: zip -r SituationReport-macOS-ARM.zip dist/SituationReport.app

      - name: Package – Linux
        if: runner.os == 'Linux'
        run: zip -r SituationReport-Linux.zip dist/SituationReport

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.zip_file }}

  release:
    name: Update Dev Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set build metadata
        run: |
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +'%Y-%m-%d')" >> $GITHUB_ENV

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Delete existing dev-latest release and tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete dev-latest --yes --cleanup-tag 2>/dev/null || true

      - name: Publish Dev Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: Dev Build – ${{ env.BUILD_DATE }} (${{ env.SHORT_SHA }})
          prerelease: true
          draft: false
          files: |
            SituationReport-Windows.zip
            SituationReport-macOS-ARM.zip
            SituationReport-Linux.zip
          body: |
            ## Dev Build – ${{ env.BUILD_DATE }} (`${{ env.SHORT_SHA }}`)

            > **Vorschau-Version** – aktueller Entwicklungsstand von `main`.
            > Für produktiven Einsatz stabile Releases verwenden.

            Eigenständige GUI-App. **Kein Python oder sonstige Installation notwendig.**

            ---

            ### Windows

            1. `SituationReport-Windows.zip` herunterladen und entpacken
            2. Im entpackten Ordner `SituationReport.exe` doppelklicken

            ### macOS (Apple Silicon)

            1. `SituationReport-macOS-ARM.zip` herunterladen und entpacken
            2. Beim **ersten Start**: Rechtsklick → *Öffnen* → *Öffnen* bestätigen

            ### Linux (x64)

            1. `SituationReport-Linux.zip` herunterladen und entpacken
            2. Im entpackten Ordner `./SituationReport` ausführen
            3. Bei Bedarf einmalig: `chmod +x SituationReport`
