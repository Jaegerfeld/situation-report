name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build – ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: SituationReport-Windows
            zip_file: SituationReport-Windows.zip
          - os: macos-latest
            artifact: SituationReport-macOS-ARM
            zip_file: SituationReport-macOS-ARM.zip
          - os: ubuntu-latest
            artifact: SituationReport-Linux
            zip_file: SituationReport-Linux.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # -----------------------------------------------------------------------
      # Windows: embeddable Python 3.11 + tkinter + deps + Chrome + source
      # -----------------------------------------------------------------------
      - name: Build portable package – Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $BUNDLE = "dist\SituationReport"
          $pyPrefix = (python -c "import sys; print(sys.prefix)").Trim()
          Write-Host "CI Python: $pyPrefix"
          New-Item -ItemType Directory -Force "$BUNDLE\python\Lib\site-packages" | Out-Null
          New-Item -ItemType Directory -Force "$BUNDLE\python\DLLs" | Out-Null

          # --- Copy Python runtime files ---
          foreach ($f in 'python.exe','pythonw.exe','python311.dll','vcruntime140.dll','vcruntime140_1.dll') {
              if (Test-Path "$pyPrefix\$f") {
                  Copy-Item "$pyPrefix\$f" "$BUNDLE\python\"
                  Write-Host "Copied: $f"
              }
          }
          # tcl/tk runtime DLLs (in Python root)
          Get-ChildItem "$pyPrefix" -Filter "tcl*.dll" | ForEach-Object {
              Copy-Item $_.FullName "$BUNDLE\python\"; Write-Host "Copied: $($_.Name)"
          }
          Get-ChildItem "$pyPrefix" -Filter "tk*.dll" | ForEach-Object {
              Copy-Item $_.FullName "$BUNDLE\python\"; Write-Host "Copied: $($_.Name)"
          }
          # Extension modules (DLLs/ – includes _tkinter.pyd)
          Copy-Item "$pyPrefix\DLLs\*" "$BUNDLE\python\DLLs\" -Recurse
          Write-Host "Copied: DLLs/"

          # --- Standard library (skip site-packages; we install fresh) ---
          Get-ChildItem "$pyPrefix\Lib" |
              Where-Object { $_.Name -notin @('site-packages','__pycache__','test','idlelib','turtledemo') } |
              ForEach-Object { Copy-Item $_.FullName "$BUNDLE\python\Lib\" -Recurse }
          Write-Host "Copied: Lib/"

          # --- tcl/tk library files ---
          # Ask the CI Python itself where its tcl library lives
          $tclInfo = & python -c "import tkinter; t=tkinter.Tcl(); import os; print(os.path.dirname(t.eval('info library')))"
          Write-Host "TCL library root: $tclInfo"
          if ($tclInfo -and (Test-Path $tclInfo)) {
              Copy-Item -Recurse $tclInfo "$BUNDLE\python\tcl"
              Write-Host "Copied tcl from: $tclInfo"
          } elseif (Test-Path "$pyPrefix\tcl") {
              Copy-Item -Recurse "$pyPrefix\tcl" "$BUNDLE\python\tcl"
              Write-Host "Copied tcl from: $pyPrefix\tcl"
          } else {
              Write-Error "tcl library not found – cannot build portable package with tkinter"
              exit 1
          }

          # --- Portable ._pth (overrides default path; makes bundle self-contained) ---
          @"
          DLLs
          Lib
          ..
          import site
          "@ -replace '^\s+', '' | Set-Content "$BUNDLE\python\python311._pth" -Encoding UTF8NoBOM

          # --- pip ---
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile get-pip.py
          & "$BUNDLE\python\python.exe" get-pip.py --no-warn-script-location
          Remove-Item get-pip.py

          # --- Python dependencies ---
          & "$BUNDLE\python\python.exe" -m pip install `
              openpyxl plotly kaleido pypdf tkcalendar --no-warn-script-location

          # --- Mandatory smoke test: tkinter must work in the bundle ---
          Write-Host "Smoke-testing tkinter in bundle..."
          & "$BUNDLE\python\python.exe" -c "import tkinter; print('tkinter OK')"
          if ($LASTEXITCODE -ne 0) {
              Write-Error "tkinter does not work in the bundled Python – aborting"
              exit 1
          }

          # --- Pre-download Chrome for offline PDF export ---
          & "$BUNDLE\python\Scripts\choreo_get_chrome.exe"

          # --- Source modules ---
          foreach ($mod in 'build_reports','transform_data','get_data','simulate','testdata_generator','launcher') {
              if (Test-Path $mod) { Copy-Item -Recurse $mod "$BUNDLE\$mod" }
          }
          foreach ($f in 'version.py','pyproject.toml','README.md','LICENSE') {
              if (Test-Path $f) { Copy-Item $f "$BUNDLE\" }
          }

          # --- Launcher batch files (python.exe so startup errors are visible) ---
          @'
          @echo off
          set "D=%~dp0"
          for /d %%i in ("%D%python\tcl\tcl*") do set "TCL_LIBRARY=%%i"
          for /d %%i in ("%D%python\tcl\tk*") do set "TK_LIBRARY=%%i"
          "%D%python\python.exe" -m build_reports
          if %ERRORLEVEL% neq 0 (
              echo.
              echo Fehler beim Starten. Bitte den roten Text oben notieren.
              pause
          )
          '@ | Set-Content "$BUNDLE\BuildReports.bat" -Encoding ASCII

          @'
          @echo off
          set "D=%~dp0"
          for /d %%i in ("%D%python\tcl\tcl*") do set "TCL_LIBRARY=%%i"
          for /d %%i in ("%D%python\tcl\tk*") do set "TK_LIBRARY=%%i"
          "%D%python\python.exe" -m transform_data
          if %ERRORLEVEL% neq 0 (
              echo.
              echo Fehler beim Starten. Bitte den roten Text oben notieren.
              pause
          )
          '@ | Set-Content "$BUNDLE\TransformData.bat" -Encoding ASCII

          @'
          @echo off
          set "D=%~dp0"
          for /d %%i in ("%D%python\tcl\tcl*") do set "TCL_LIBRARY=%%i"
          for /d %%i in ("%D%python\tcl\tk*") do set "TK_LIBRARY=%%i"
          "%D%python\python.exe" -m launcher
          if %ERRORLEVEL% neq 0 (
              echo.
              echo Fehler beim Starten. Bitte den roten Text oben notieren.
              pause
          )
          '@ | Set-Content "$BUNDLE\SituationReport.bat" -Encoding ASCII

      # -----------------------------------------------------------------------
      # macOS / Linux: source + first-run venv launcher scripts
      # -----------------------------------------------------------------------
      - name: Build portable package – macOS / Linux
        if: runner.os != 'Windows'
        run: |
          BUNDLE="dist/SituationReport"
          mkdir -p "$BUNDLE"

          # Copy source modules
          for mod in build_reports transform_data get_data simulate testdata_generator launcher; do
            [ -d "$mod" ] && cp -r "$mod" "$BUNDLE/"
          done
          for f in version.py pyproject.toml README.md LICENSE; do
            [ -f "$f" ] && cp "$f" "$BUNDLE/"
          done

          # Write launcher scripts via Python to avoid heredoc quoting issues
          python3 - <<'PYEOF'
          import os, stat, sys

          BUNDLE = "dist/SituationReport"
          IS_MACOS = sys.platform == "darwin"
          RX = stat.S_IRWXU | stat.S_IRGRP | stat.S_IXGRP | stat.S_IROTH | stat.S_IXOTH

          def launcher(module):
              tkcheck = 'if ! python3 -c "import tkinter" 2>/dev/null; then\n'
              tkcheck += '    echo "FEHLER: tkinter nicht installiert."\n'
              if not IS_MACOS:
                  tkcheck += '    echo "  Ubuntu/Debian: sudo apt install python3-tk"\n'
                  tkcheck += '    echo "  Fedora: sudo dnf install python3-tkinter"\n'
              tkcheck += '    exit 1\nfi\n'
              return (
                  "#!/bin/bash\n"
                  "set -e\n"
                  'cd "$(dirname "$0")"\n'
                  + tkcheck
                  + 'if [ ! -d ".venv" ]; then\n'
                  '    echo "Einmalige Einrichtung (ca. 1 Minute, Internet erforderlich)..."\n'
                  "    python3 -m venv .venv\n"
                  "    .venv/bin/pip install --quiet openpyxl plotly kaleido pypdf tkcalendar\n"
                  "    .venv/bin/choreo_get_chrome\n"
                  '    echo "Einrichtung abgeschlossen."\n'
                  "fi\n"
                  f'.venv/bin/python -m {module} "$@"\n'
              )

          scripts = {
              "SituationReport.sh": launcher("launcher"),
              "BuildReports.sh": launcher("build_reports"),
              "TransformData.sh": launcher("transform_data"),
          }
          if IS_MACOS:
              scripts["SituationReport.command"] = launcher("launcher")
              scripts["BuildReports.command"] = launcher("build_reports")
              scripts["TransformData.command"] = launcher("transform_data")

          for name, content in scripts.items():
              path = os.path.join(BUNDLE, name)
              with open(path, "w", newline="\n") as f:
                  f.write(content)
              os.chmod(path, RX)
          PYEOF

      # -----------------------------------------------------------------------
      # Package
      # -----------------------------------------------------------------------
      - name: Package – Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\SituationReport -DestinationPath SituationReport-Windows.zip

      - name: Package – macOS
        if: runner.os == 'macOS'
        run: zip -r SituationReport-macOS-ARM.zip dist/SituationReport

      - name: Package – Linux
        if: runner.os == 'Linux'
        run: zip -r SituationReport-Linux.zip dist/SituationReport

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.zip_file }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: false
          draft: false
          files: |
            SituationReport-Windows.zip
            SituationReport-macOS-ARM.zip
            SituationReport-Linux.zip
          body: |
            ## SituationReport ${{ github.ref_name }}

            Portables Paket – enthält alle Quelldateien, Skripte und Konfigurationsmöglichkeiten.
            Kein Python oder sonstige Installation notwendig (Windows).

            ---

            ### Windows

            1. `SituationReport-Windows.zip` herunterladen und entpacken
            2. `BuildReports.bat` doppelklicken → Build Reports GUI
               `TransformData.bat` doppelklicken → Transform Data GUI
            3. Beim ersten Start: Windows SmartScreen → **Weitere Informationen** → **Trotzdem ausführen**

            > Python (3.11) und Chrome (PDF-Export) sind im Paket enthalten.

            ### macOS (Apple Silicon)

            1. `SituationReport-macOS-ARM.zip` herunterladen und entpacken
            2. Rechtsklick auf `BuildReports.command` → *Öffnen* → *Öffnen* bestätigen (Gatekeeper, einmalig)
            3. Beim **ersten Start**: einmalige Einrichtung (~1 Min, Internet erforderlich)

            ### Linux (x64)

            1. `SituationReport-Linux.zip` herunterladen und entpacken
            2. Voraussetzung: `python3` und `python3-tk` installiert
               (`sudo apt install python3-tk` auf Ubuntu/Debian)
            3. Im entpackten Ordner: `./BuildReports.sh`
               Beim **ersten Start**: einmalige Einrichtung (~1 Min, Internet erforderlich)

            ---

            ### Datenformat

            | Datei | Bedeutung |
            |-------|-----------|
            | `*_IssueTimes.xlsx` | Pflicht – Durchlaufzeiten pro Issue und Stage |
            | `*_CFD.xlsx` | Optional – tägliche Stage-Zählungen für CFD |
            | `*_Transitions.xlsx` | Optional – Transitionen für Process-Flow-Ansicht |
