name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build – ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: SituationReport-Windows
            zip_file: SituationReport-Windows.zip
          - os: macos-latest
            artifact: SituationReport-macOS-ARM
            zip_file: SituationReport-macOS-ARM.zip
          - os: ubuntu-latest
            artifact: SituationReport-Linux
            zip_file: SituationReport-Linux.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tkinter (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: pip install -e "." "pyinstaller>=6.0,<6.20"

      - name: Download bundled Chrome (kaleido PDF export)
        run: choreo_get_chrome
        shell: bash

      - name: Build with PyInstaller
        run: pyinstaller build_gui.spec

      - name: Package – Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\SituationReport -DestinationPath SituationReport-Windows.zip

      - name: Package – macOS
        if: runner.os == 'macOS'
        run: zip -r SituationReport-macOS-ARM.zip dist/SituationReport.app

      - name: Package – Linux
        if: runner.os == 'Linux'
        run: zip -r SituationReport-Linux.zip dist/SituationReport

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.zip_file }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: false
          draft: false
          files: |
            SituationReport-Windows.zip
            SituationReport-macOS-ARM.zip
            SituationReport-Linux.zip
          body: |
            ## SituationReport ${{ github.ref_name }}

            Eigenständige GUI-App. **Kein Python oder sonstige Installation notwendig.**

            ---

            ### Windows

            1. `SituationReport-Windows.zip` herunterladen und entpacken
            2. Im entpackten Ordner `SituationReport.exe` doppelklicken

            ### macOS (Apple Silicon)

            1. `SituationReport-macOS-ARM.zip` herunterladen und entpacken
            2. `SituationReport.app` in den Ordner *Programme* ziehen (optional)
            3. Beim **ersten Start**: Rechtsklick → *Öffnen* → *Öffnen* bestätigen
               *(macOS Gatekeeper-Hinweis, da die App nicht signiert ist)*

            ### Linux (x64)

            1. `SituationReport-Linux.zip` herunterladen und entpacken
            2. Im entpackten Ordner `./SituationReport` ausführen
            3. Bei Bedarf einmalig: `chmod +x SituationReport`

            ---

            ### Voraussetzungen

            Keine – alle Abhängigkeiten (inkl. Chrome für PDF-Export) sind enthalten.

            ### Datenformat

            | Datei | Bedeutung |
            |-------|-----------|
            | `*_IssueTimes.xlsx` | Pflicht – Durchlaufzeiten pro Issue und Stage |
            | `*_CFD.xlsx` | Optional – tägliche Stage-Zählungen für CFD |
            | `*_Transitions.xlsx` | Optional – Transitionen für Process-Flow-Ansicht |
