site_name: SituationReport
site_description: Jira issue data toolsuite for metrics and reports
site_url: https://jaegerfeld.github.io/situation-report/
repo_url: https://github.com/Jaegerfeld/situation-report
repo_name: Jaegerfeld/situation-report
edit_uri: edit/main/docs/

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: de
          default: true
          name: Deutsch
          build: true
        - locale: en
          name: English
          build: true

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Dunkelmodus
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Hellmodus
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.action.edit
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

nav:
  - Start: index.md
  - Module:
    - Übersicht: modules/index.md
    - launcher: modules/launcher.md
    - transform_data: modules/transform_data.md
    - build_reports: modules/build_reports.md
    - helper: modules/helper.md
    - testdata_generator: modules/testdata_generator.md
    - get_data: modules/get_data.md
    - simulate: modules/simulate.md
  - Architektur: architecture.md
  - Entwicklung: development.md
  - Releases: releases.md
